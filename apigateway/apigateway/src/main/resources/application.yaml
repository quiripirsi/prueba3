server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: cine-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/peliculas/**, /api/v1/salas/**

        - id: venta-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/clientes/**, /api/v1/confiteria/**, /api/v1/reservas/**